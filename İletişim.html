<form style="background-color:rgb(235, 221, 236); border-radius: 10px; max-width: 700px; padding: 20px; margin: 70px;" id="satisfaction-form">
    <h1 style="font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; color: rgb(39, 9, 66);">Memnuniyet Anketi</h1>
    <label for="name">Adınız:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">E-posta Adresiniz:</label>
    <input type="email" id="email" name="email" required>

    <label for="satisfaction">Memnuniyet Derecesi:</label>
    <select id="satisfaction" name="satisfaction" required>
        <option value="5">Çok Memnun</option>
        <option value="4">Memnun</option>
        <option value="3">Orta</option>
        <option value="2">Memnun Değil</option>
        <option value="1">Hiç Memnun Değil</option>
    </select>

    <label for="feedback">Geri Bildiriminiz:</label>
    <textarea id="feedback" name="feedback" rows="4" required></textarea>

    <button type="button" onclick="submitForm()">Gönder</button>
</form>
<footer>
    Az Çok baskı 2023
</footer>
<script>
    function submitForm() {

        alert("Anket gönderildi!");
        document.getElementById("satisfaction-form").reset();
    }
</script>
